<!-- views/components/card.html -->

<div class="card">
    <h3 class="card__title">{{title}}</h3>
    <div class="card__icons">
        <img src="{{icon1}}" alt="ícono principal" class="card__icon card__icon--main">
        <img src="{{icon2}}" alt="ícono secundario" class="card__icon card__icon--secondary">
    </div>
    <p class="card__description">{{description}}</p>
</div>
